<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/children"></ion-back-button>
    </ion-buttons>

    <ion-title>{{ child?.name }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- ADD -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>➕ Adicionar vacina</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <ion-item>
        <ion-select [(ngModel)]="newVaccine.vaccineId" placeholder="Vacina">
          <ion-select-option *ngFor="let v of vaccines" [value]="v.id">
            {{ v.name }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-input type="date" [(ngModel)]="newVaccine.scheduledDate"></ion-input>
      </ion-item>

      <ion-button expand="block" (click)="addVaccine()">
        Adicionar
      </ion-button>

    </ion-card-content>
  </ion-card>

  <!-- HISTORY -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>📋 Histórico vacinal</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <div *ngFor="let v of getHistory()" class="vaccine-item">

        <div class="header">
          <strong>{{ v.name }}</strong>

          <span class="badge" [ngClass]="v.status">
            {{ v.status }}
          </span>
        </div>

        <p>📅 Prevista: {{ v.scheduledDate }}</p>
        <p *ngIf="v.appliedDate">💉 Aplicada: {{ v.appliedDate }}</p>

        <div class="actions">
          <ion-button size="small" (click)="markAsApplied(v)">
            Aplicar
          </ion-button>

          <ion-button size="small" fill="outline" (click)="editDate(v)">
            Editar
          </ion-button>

          <ion-button size="small" color="danger" (click)="deleteVaccination(v)">
            Remover
          </ion-button>
        </div>

      </div>

    </ion-card-content>
  </ion-card>

</ion-content>
